<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RISC-V Simulator Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-900 to-slate-800 text-white min-h-screen">

<!-- HEADER -->
<div class="p-4 text-center text-3xl font-bold tracking-wide">
  ⚙️ RISC-V Processor Simulator
</div>

<!-- CONTROL PANEL -->
<div class="flex justify-center gap-4 mt-4">
  <button onclick="runSim()" class="bg-green-500 hover:bg-green-600 px-5 py-2 rounded-xl shadow-lg">▶ Run</button>
  <button onclick="stepSim()" class="bg-blue-500 hover:bg-blue-600 px-5 py-2 rounded-xl shadow-lg">⏭ Step</button>
  <button onclick="resetSim()" class="bg-red-500 hover:bg-red-600 px-5 py-2 rounded-xl shadow-lg">🔄 Reset</button>
</div>

<!-- PIPELINE -->
<div class="grid grid-cols-5 gap-4 p-6 mt-6">
  <div class="stage" id="ifBox">IF<br><span id="if"></span></div>
  <div class="stage" id="idBox">ID<br><span id="id"></span></div>
  <div class="stage" id="exBox">EX<br><span id="ex"></span></div>
  <div class="stage" id="memBox">MEM<br><span id="mem"></span></div>
  <div class="stage" id="wbBox">WB<br><span id="wb"></span></div>
</div>

<!-- MAIN GRID -->
<div class="grid grid-cols-3 gap-4 p-6">

  <!-- REGISTERS -->
  <div class="glass p-4 rounded-xl">
    <h2 class="text-xl mb-2">🧠 Registers</h2>
    <div id="registers" class="grid grid-cols-4 gap-2 text-sm"></div>
  </div>

  <!-- MEMORY -->
  <div class="glass p-4 rounded-xl col-span-2">
    <h2 class="text-xl mb-2">💾 Memory</h2>
    <div class="h-64 overflow-y-scroll text-sm" id="memory"></div>
  </div>

</div>

<!-- CLOCK -->
<div class="text-center text-lg mt-4">
  ⏱ Clock Cycle: <span id="clock">0</span>
</div>

<!-- MACHINE CODE INPUT -->
<div class="p-6">
  <h2 class="text-xl mb-2">📥 Machine Code Input</h2>
  <textarea id="codeInput" class="w-full h-32 text-black p-2 rounded"></textarea>
  <button onclick="submitCode()" class="mt-2 bg-purple-500 px-4 py-2 rounded">Upload Code</button>
</div>

<!-- STYLES -->
<style>
.stage {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  transition: 0.3s;
}
.stage.active {
  background: #3b82f6;
  transform: scale(1.05);
}
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}
</style>

<!-- SCRIPT -->
<script>
let oldRegisters = [];

async function fetchData() {
  const res = await fetch('/data');
  const data = await res.json();

  // CLOCK
  document.getElementById("clock").innerText = data.clock;
  

  // PIPELINE
  const ids = ["if","id","ex","mem","wb"];
  ids.forEach((id, i) => {
    document.getElementById(id).innerText = data.current_instruction[i] || "";
    
  });

  // REGISTERS
  const regDiv = document.getElementById("registers");
  regDiv.innerHTML = "";
  data.registers.forEach((val, i) => {
    let div = document.createElement("div");
    div.innerText = `x${i}: ${val}`;
    div.className = "p-1 rounded bg-slate-700";

    if (oldRegisters[i] !== undefined && oldRegisters[i] !== val) {
      div.classList.add("bg-green-500");
    }

    regDiv.appendChild(div);
  });
  oldRegisters = [...data.registers];

  // MEMORY
  const memDiv = document.getElementById("memory");
  memDiv.innerHTML = "";
  for (let key in data.memory) {
    let p = document.createElement("div");
    p.innerText = `${key}: ${data.memory[key]}`;
    memDiv.appendChild(p);
  }
}

// CONTROLS
async function runSim() {
  await fetch('/run');
}
async function stepSim() {
  await fetch('/step');
}
async function resetSim() {
  await fetch('/reset');
}

// UPLOAD CODE
async function submitCode() {
  const code = document.getElementById("codeInput").value;
  await fetch('/', {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ machineCode: code })
  });
}

// AUTO REFRESH
setInterval(fetchData, 500);
</script>

</body>
</html>
